<div class="auth-wrapper">
  <div class="auth-card">
    <h2 class="auth-title">Registracija</h2>
    <p class="auth-subtitle">Kreirajte novi nalog</p>


    <div class="form-group">
      <label>Username</label>
      <input type="email" [(ngModel)]="username" placeholder="vas@email.com" class="form-input" />
    </div>


    <div class="form-group">
      <label>Lozinka</label>
      <input type="password" [(ngModel)]="password" placeholder="••••••••" class="form-input" />
    </div>

    <button class="auth-btn" (click)="register()">Registruj se</button>

    <p class="auth-switch">
      Već imate nalog? <a routerLink="/login">Prijavite se</a>
    </p>
  </div>
</div>
