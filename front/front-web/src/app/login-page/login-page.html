<div class="auth-wrapper">
  <div class="auth-card">
    <h2 class="auth-title">Prijava</h2>
    <p class="auth-subtitle">Dobrodošli nazad</p>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="vas@email.com" class="form-input" />
    </div>

    <div class="form-group">
      <label>Lozinka</label>
      <input type="password" [(ngModel)]="password" placeholder="••••••••" class="form-input" />
    </div>

    <button class="auth-btn" (click)="login()">Prijavi se</button>

    <p class="auth-switch">
      Nemate nalog? <a routerLink="/register">Registrujte se</a>
    </p>
  </div>
</div>
